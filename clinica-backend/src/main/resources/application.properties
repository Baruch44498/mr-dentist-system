spring.application.name=clinica-backend
# Conexión a la Base de Datos MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/clinica_mr_dentist?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=123456

# Configuración de Spring Data JPA (Hibernate)
# 'update' permite que Spring cree o actualice las tablas automáticamente a partir de tu código
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
